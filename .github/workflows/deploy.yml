name: Deploy to EC2

on:
  push:
    branches:
      - master


jobs:
  deploy:
    name: Push to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 52.66.100.58
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/class-ci || git clone https://github.com/aun009/class-ci.git ~/class-ci && cd ~/class-ci
            git pull origin master
            npm install
            npm run build
            pm2 restart class-ci || pm2 start npm --name "class-ci" -- start
